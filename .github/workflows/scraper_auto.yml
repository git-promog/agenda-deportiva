name: Actualizar Agenda Automáticamente

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 # Versión actualizada

      - name: Configurar Python
        uses: actions/setup-python@v5 # Versión actualizada
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: |
          pip install -r agenda-deportiva/requirements.txt

      - name: Ejecutar Scraper
        env:
          # Estas deben coincidir EXACTAMENTE con los nombres en Settings -> Secrets
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python agenda-deportiva/subir_agenda.py
